name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  prebuild:
    name: Prebuild
    runs-on: ubuntu-24.04
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@vela-engineering"

      - name: Install dependencies
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate grammar
        run: npm run generate-grammar-prod

      - name: Build app
        run: npm run build

      - name: Fetch datasets
        run: npm run fetch-datasets

      - name: Get version
        id: version
        run: |
          VERSION=$(node -e 'fs=require("fs");console.log(JSON.parse(fs.readFileSync("package.json")).dependencies["@vela-engineering/kuzu"])')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cleanup
        run: rm -rf node_modules .git explorer.db

      - uses: actions/upload-artifact@v4
        with:
          path: .
          name: explorer-prebuild

    outputs:
      version: ${{ steps.version.outputs.version }}

  docker:
    needs: prebuild
    name: Build and push Docker image
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: explorer-prebuild

      - name: Set tags
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "TAGS=ghcr.io/${OWNER}/kuzu-explorer:latest,ghcr.io/${OWNER}/kuzu-explorer:${{ needs.prebuild.outputs.version }}" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.TAGS }}
          build-args: |
            SKIP_GRAMMAR=true
            SKIP_BUILD_APP=true
            SKIP_DATASETS=true
          secrets: |
            NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}
